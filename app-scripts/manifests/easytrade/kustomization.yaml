apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# EasyTrade Application Manifests
# Deploy with: kubectl apply -k .

namespace: easytrade

resources:
  # Release manifests (individual files from GitHub)
  - https://raw.githubusercontent.com/Dynatrace/easytrade/main/kubernetes-manifests/release/connection-strings.yaml
  - https://raw.githubusercontent.com/Dynatrace/easytrade/main/kubernetes-manifests/release/db.yaml
  - https://raw.githubusercontent.com/Dynatrace/easytrade/main/kubernetes-manifests/release/rabbitmq.yaml
  - https://raw.githubusercontent.com/Dynatrace/easytrade/main/kubernetes-manifests/release/feature-flag-service.yaml
  - https://raw.githubusercontent.com/Dynatrace/easytrade/main/kubernetes-manifests/release/feature-flag-service-setup.yaml
  - https://raw.githubusercontent.com/Dynatrace/easytrade/main/kubernetes-manifests/release/accountservice.yaml
  - https://raw.githubusercontent.com/Dynatrace/easytrade/main/kubernetes-manifests/release/aggregator-service.yaml
  - https://raw.githubusercontent.com/Dynatrace/easytrade/main/kubernetes-manifests/release/broker-service.yaml
  - https://raw.githubusercontent.com/Dynatrace/easytrade/main/kubernetes-manifests/release/calculationservice.yaml
  - https://raw.githubusercontent.com/Dynatrace/easytrade/main/kubernetes-manifests/release/contentcreator.yaml
  - https://raw.githubusercontent.com/Dynatrace/easytrade/main/kubernetes-manifests/release/credit-card-order-service.yaml
  - https://raw.githubusercontent.com/Dynatrace/easytrade/main/kubernetes-manifests/release/engine.yaml
  - https://raw.githubusercontent.com/Dynatrace/easytrade/main/kubernetes-manifests/release/frontend.yaml
  - https://raw.githubusercontent.com/Dynatrace/easytrade/main/kubernetes-manifests/release/frontendreverseproxy.yaml
  - https://raw.githubusercontent.com/Dynatrace/easytrade/main/kubernetes-manifests/release/loginservice.yaml
  - https://raw.githubusercontent.com/Dynatrace/easytrade/main/kubernetes-manifests/release/manager.yaml
  - https://raw.githubusercontent.com/Dynatrace/easytrade/main/kubernetes-manifests/release/offerservice.yaml
  - https://raw.githubusercontent.com/Dynatrace/easytrade/main/kubernetes-manifests/release/pricing-service.yaml
  - https://raw.githubusercontent.com/Dynatrace/easytrade/main/kubernetes-manifests/release/problem-operator.yaml
  - https://raw.githubusercontent.com/Dynatrace/easytrade/main/kubernetes-manifests/release/third-party-service.yaml
  - https://raw.githubusercontent.com/Dynatrace/easytrade/main/kubernetes-manifests/release/loadgen.yaml

  # Problem patterns (remote directory with its own kustomization.yaml)
  - https://github.com/Dynatrace/easytrade/kubernetes-manifests/problem-patterns?ref=main

# Patches for loadgen deployment:
# 1. Reduce resource requirements (Original: 1 CPU / 2Gi -> Reduced: 100m CPU / 256Mi)
# 2. Set RARE_VISITS_INTERVAL_MINUTES to 3 (default is 60) for more frequent longbuy/longsell trades
patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: loadgen
      spec:
        template:
          spec:
            containers:
              - name: loadgen
                env:
                  - name: EASYTRADE_URL
                    value: "http://frontendreverseproxy-easytrade"
                  - name: RARE_VISITS_INTERVAL_MINUTES
                    value: "3"
                resources:
                  requests:
                    cpu: "100m"
                    memory: "256Mi"
                  limits:
                    cpu: "200m"
                    memory: "512Mi"
