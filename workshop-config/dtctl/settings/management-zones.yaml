# =============================================================================
# Management Zones - dtctl Settings Configuration
# Schema: builtin:management-zones
# =============================================================================

configs:
  # Management Zone: dt-orders-monolith (Production services)
  - name: dt-orders-monolith
    schema: builtin:management-zones
    scope: environment
    value:
      name: dt-orders-monolith
      rules:
        - type: ME
          enabled: true
          attributeRule:
            entityType: SERVICE
            serviceToHostPropagation: true
            serviceToPGPropagation: true
            conditions:
              - key: SERVICE_TAGS
                operator: EQUALS
                tag: "stage:production"

  # Management Zone: dt-orders-k8 (Kubernetes staging services)
  - name: dt-orders-k8
    schema: builtin:management-zones
    scope: environment
    value:
      name: dt-orders-k8
      rules:
        - type: ME
          enabled: true
          attributeRule:
            entityType: SERVICE
            serviceToHostPropagation: true
            serviceToPGPropagation: true
            conditions:
              - key: SERVICE_TAGS
                operator: EQUALS
                tag: "stage:staging"

  # Management Zone: dt-orders-services (Dev services)
  - name: dt-orders-services
    schema: builtin:management-zones
    scope: environment
    value:
      name: dt-orders-services
      rules:
        - type: ME
          enabled: true
          attributeRule:
            entityType: SERVICE
            serviceToHostPropagation: true
            serviceToPGPropagation: true
            conditions:
              - key: SERVICE_TAGS
                operator: EQUALS
                tag: "stage:dev"

  # Management Zone: EasyTrade
  - name: EasyTrade
    schema: builtin:management-zones
    scope: environment
    value:
      name: EasyTrade
      rules:
        # Process Groups in easytrade namespace
        - type: ME
          enabled: true
          attributeRule:
            entityType: PROCESS_GROUP
            pgToHostPropagation: true
            pgToServicePropagation: true
            conditions:
              - key: CLOUD_APPLICATION_NAMESPACE_NAME
                operator: EQUALS
                stringValue: easytrade
                caseSensitive: false
        # Cloud Applications in easytrade namespace
        - type: ME
          enabled: true
          attributeRule:
            entityType: CLOUD_APPLICATION
            conditions:
              - key: CLOUD_APPLICATION_NAMESPACE_NAME
                operator: EQUALS
                stringValue: easytrade
                caseSensitive: false
        # Web Applications containing easytrade
        - type: ME
          enabled: true
          attributeRule:
            entityType: WEB_APPLICATION
            conditions:
              - key: WEB_APPLICATION_NAME
                operator: CONTAINS
                stringValue: easytrade
                caseSensitive: false
        # Cloud Application Namespace
        - type: ME
          enabled: true
          attributeRule:
            entityType: CLOUD_APPLICATION_NAMESPACE
            conditions:
              - key: CLOUD_APPLICATION_NAMESPACE_NAME
                operator: EQUALS
                stringValue: easytrade
                caseSensitive: true
        # Services with app:easytrade tag
        - type: ME
          enabled: true
          attributeRule:
            entityType: SERVICE
            serviceToHostPropagation: true
            serviceToPGPropagation: true
            conditions:
              - key: SERVICE_TAGS
                operator: EQUALS
                tag: "app:easytrade"
