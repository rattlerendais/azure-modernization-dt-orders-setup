manifestVersion: 1.0

# =============================================================================
# Monaco v2 Configuration for Dynatrace Azure Workshop
# =============================================================================
# Uses Platform Token for authentication (Settings 2.0 API only)
#
# Note: Classic API configs have been removed to enable single Platform Token:
#   - k8/conditional-naming-processgroup (process group naming)
#   - db (dashboard - use dtctl for new dashboards)
#   - synthetics (synthetic monitors)
#   - easytrade/custom-service-dotnet (custom service detection)
#   - easytrade-application (RUM app - auto-detected by Dynatrace)
# =============================================================================

projects:
  # Settings 2.0: OneAgent Features for BizEvent Capturing
  - name: easytrade-oneagent-features
    path: projects/easytrade-oneagent-features

  # Settings 2.0: EasyTrade Business Events Capturing Rules
  - name: easytrade-bizevents
    path: projects/easytrade-bizevents

environmentGroups:
  - name: default
    environments:
      - name: workshop
        url:
          type: environment
          value: DT_BASEURL_PLATFORM
        auth:
          platformToken:
            name: DT_PLATFORM_TOKEN
