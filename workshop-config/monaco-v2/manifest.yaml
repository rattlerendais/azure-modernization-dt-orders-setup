manifestVersion: 1.0

# =============================================================================
# Monaco v2 Configuration for DT-Orders Workshop
# =============================================================================
# This manifest contains both Classic API and Settings 2.0 configurations.
# =============================================================================

projects:
  # Classic API: Conditional Naming for Process Groups
  - name: k8
    path: projects/k8

  # Classic API: Dashboard
  - name: db
    path: projects/db

  # Classic API: Synthetic Monitors
  - name: synthetics
    path: projects/synthetics

  # Classic API: Custom Service (.NET) for EasyTrade
  - name: easytrade
    path: projects/easytrade

  # Settings 2.0: OneAgent Features for BizEvent Capturing
  - name: easytrade-oneagent-features
    path: projects/easytrade-oneagent-features

  # Settings 2.0: EasyTrade Business Events Capturing Rules
  - name: easytrade-bizevents
    path: projects/easytrade-bizevents

  # Classic API + Settings 2.0: EasyTrade Web Application & Detection
  - name: easytrade-application
    path: projects/easytrade-application

environmentGroups:
  - name: default
    environments:
      - name: workshop
        url:
          type: environment
          value: DT_BASEURL
        auth:
          token:
            name: DT_API_TOKEN
