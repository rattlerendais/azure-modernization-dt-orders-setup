configs:
  # Enable HTTP bizevent capturing for .NET services
  - id: http-dotnet
    config:
      template: &template oneagent-feature.json
      skip: false
      parameters:
        featureKey: SENSOR_DOTNET_BIZEVENTS_HTTP_INCOMING
    type: &type
      settings:
        schema: builtin:oneagent.features
        scope: environment

  # Enable HTTP bizevent capturing for webserver (nginx)
  - id: http-webserver
    config:
      template: *template
      skip: false
      parameters:
        featureKey: SENSOR_WEBSERVER_BIZEVENTS_HTTP_INCOMING
    type: *type

  # Enable HTTP bizevent capturing for Node.js services
  - id: http-nodejs
    config:
      template: *template
      skip: false
      parameters:
        featureKey: SENSOR_NODEJS_BIZEVENTS_HTTP_INCOMING
    type: *type

  # Enable HTTP bizevent capturing for Java services
  - id: http-java
    config:
      template: *template
      skip: false
      parameters:
        featureKey: SENSOR_JAVA_BIZEVENTS_HTTP_INCOMING
    type: *type

  # Enable HTTP bizevent capturing for Go services
  - id: http-go
    config:
      template: *template
      skip: false
      parameters:
        featureKey: SENSOR_GO_BIZEVENTS_HTTP_INCOMING
    type: *type
